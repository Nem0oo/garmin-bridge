name: Build Garmin-bridge Staging Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_push_staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/garmin-bridge:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/garmin-bridge:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger_watchtower:
    needs: build_and_push_staging
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID }}"

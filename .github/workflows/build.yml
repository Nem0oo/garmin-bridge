name: Build Garmin-bridge Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag previous
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/garmin-bridge:latest && \
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/garmin-bridge:latest ${{ secrets.DOCKERHUB_USERNAME }}/mon-site-hugo:previous && \
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/garmin-bridge:previous || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/garmin-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
